<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국의 산 🏔 북한산</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#eee}
#app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 20px rgba(0,0,0,.15)}
.hdr{background:linear-gradient(135deg,#2d6a4f,#52b788);color:#fff;padding:14px 16px;text-align:center}
.hdr h1{font-size:18px;font-weight:700}.hdr p{font-size:11px;opacity:.85;margin-top:2px}
#map{width:100%;height:260px;background:#e8f4e8}
.elev-wrap{background:#fff;border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;padding:10px 14px 6px}
.elev-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.elev-legend{display:flex;gap:8px;align-items:center}
.leg-item{display:flex;align-items:center;gap:3px;font-size:10px;color:#555;font-weight:600}
.leg-dot{width:11px;height:11px;border-radius:2px;display:inline-block}
.leg-dot.n{background:#4a90d9}.leg-dot.h{background:#f5a0b5}
.elev-sum{font-size:13px;font-weight:700;color:#222}
#eCanvas{display:block;width:100%;height:148px;background:#fff}
.hikers{padding:10px 12px 4px}
.hrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hico{width:36px;flex-shrink:0}
.hico img{width:34px;height:34px;border-radius:50%;object-fit:cover;display:block}
.hbody{flex:1}.hname{font-size:11px;font-weight:700}
.bgbar{background:#e9ecef;border-radius:8px;height:7px;margin-top:3px;overflow:hidden}
.fgbar{height:100%;border-radius:8px;width:0%}
.hstat{font-size:11px;color:#888;min-width:90px;text-align:right}
.sec{padding:10px 12px 0}.sec-title{font-size:12px;font-weight:700;margin-bottom:6px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}
.cbtn{background:#fff;border:1.5px solid #ddd;border-radius:9px;padding:7px 3px;cursor:pointer;font-family:inherit;text-align:center}
.cbtn:hover{border-color:#52b788;background:#f0fff4}
.cbtn.on-e{border-color:#2d9e6b;background:#d8f3dc;font-weight:700}
.cbtn.on-m{border-color:#e9a030;background:#fff3cd;font-weight:700}
.cbtn .cn{font-size:11px;font-weight:600;color:#222}.cbtn .cd{font-size:10px;color:#888;margin-top:1px}
.cinfo{margin:0 12px 10px;background:#f8f9fa;border-radius:10px;padding:11px 13px}
.ci-name{font-size:14px;font-weight:700;margin-bottom:5px}
.ci-desc{font-size:11px;color:#666;line-height:1.65;margin-bottom:7px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;background:#d8f3dc;color:#2d6a4f;font-weight:600}
.tag.m{background:#fff3cd;color:#b07a00}
.ctrl{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid #eee}
#btnGo{flex:1;background:#2d6a4f;color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
#btnGo:hover{background:#40916c}#btnGo.busy{background:#aaa;cursor:default}
#btnRst{background:#fff;border:1.5px solid #ddd;border-radius:9px;padding:12px 14px;font-size:13px;cursor:pointer;font-family:inherit}
#btnRst:hover{border-color:#e76f51;color:#e76f51}
.spd-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.spd-wrap label{font-size:10px;color:#888}.spd-wrap input{width:70px;accent-color:#2d6a4f}
.mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900}
.popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:18px;padding:28px 24px;text-align:center;z-index:901;width:88%;max-width:300px;box-shadow:0 10px 40px rgba(0,0,0,.25)}
.mask.on{display:block}.popup.on{display:block;animation:pop .3s ease}
@keyframes pop{from{transform:translate(-50%,-50%) scale(.8);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
.p-ico{font-size:50px;margin-bottom:10px}.p-ttl{font-size:19px;font-weight:800;color:#2d6a4f;margin-bottom:8px}
.p-dsc{font-size:12px;color:#666;line-height:1.7;white-space:pre-line}
.p-btn{margin-top:16px;background:#2d6a4f;color:#fff;border:none;border-radius:9px;padding:10px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div class="hdr"><h1>🏔 한국의 산 — 북한산</h1><p>국립공원 공식 탐방코스 시뮬레이터</p></div>
  <div id="map"></div>
  <div class="elev-wrap">
    <div class="elev-header">
      <div class="elev-legend">
        <span class="leg-item"><span class="leg-dot n"></span>보통</span>
        <span class="leg-item"><span class="leg-dot h"></span>어려움</span>
      </div>
      <div class="elev-sum" id="elevSum">코스를 선택하세요</div>
    </div>
    <canvas id="eCanvas"></canvas>
  </div>
  <div class="hikers">
    <div class="hrow">
      <div class="hico"><img id="img0" src="" style="border:2px solid #74c69d"></div>
      <div class="hbody"><div class="hname">산린이</div><div class="bgbar"><div class="fgbar" id="b0" style="background:#74c69d"></div></div></div>
      <div class="hstat" id="s0">0.0km · 0분</div>
    </div>
    <div class="hrow">
      <div class="hico"><img id="img1" src="" style="border:2px solid #f4a261"></div>
      <div class="hbody"><div class="hname">산춘기</div><div class="bgbar"><div class="fgbar" id="b1" style="background:#f4a261"></div></div></div>
      <div class="hstat" id="s1">0.0km · 0분</div>
    </div>
    <div class="hrow">
      <div class="hico"><img id="img2" src="" style="border:2px solid #e63946"></div>
      <div class="hbody"><div class="hname">산대장</div><div class="bgbar"><div class="fgbar" id="b2" style="background:#e63946"></div></div></div>
      <div class="hstat" id="s2">0.0km · 0분</div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">🟢 쉬움 (9개)</div>
    <div class="grid3" id="gEasy"></div>
    <div class="sec-title">🟡 보통 (4개)</div>
    <div class="grid3" id="gMed"></div>
  </div>
  <div class="cinfo">
    <div class="ci-name" id="ciName">코스를 선택하세요</div>
    <div class="ci-desc" id="ciDesc">위의 버튼을 눌러 탐방코스를 선택하고 ▶출발을 눌러보세요!</div>
    <div class="tags" id="ciTags"></div>
  </div>
  <div class="ctrl">
    <button id="btnGo" onclick="goClick()">▶ 출발</button>
    <button id="btnRst" onclick="resetClick()">↺ 리셋</button>
    <div class="spd-wrap"><label>⏩ 속도</label><input type="range" id="spd" min="1" max="10" value="5"></div>
  </div>
</div>
<div class="mask" id="mask" onclick="closePopup()"></div>
<div class="popup" id="popup">
  <div class="p-ico" id="pIco">🏆</div>
  <div class="p-ttl" id="pTtl">도착!</div>
  <div class="p-dsc" id="pDsc"></div>
  <button class="p-btn" onclick="closePopup()">확인</button>
</div>

function smoothRoute(pts) {
  if (!pts||pts.length<2) return pts||[];
  var r=[];
  for (var i=0;i<pts.length-1;i++) {
    var p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];
    for (var t=0;t<10;t++) {
      var tt=t/10,t2=tt*tt,t3=t2*tt;
      r.push([
        0.5*((2*p1[0])+(-p0[0]+p2[0])*tt+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
        0.5*((2*p1[1])+(-p0[1]+p2[1])*tt+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)
      ]);
    }
  }
  r.push(pts[pts.length-1]);
  return r;
}

function makeRoute(c) {
  var pts=COURSE_GPS[c.id];
  return (pts&&pts.length>=2)?smoothRoute(pts):[c.s,c.e];
}

function calcHikeTime(course){
  // 코스별 과학적 시간 데이터
  // [산린이, 산춘기, 산대장]
  var courseData = {
    // 대남문코스: Tobler 법칙 + 피로누적 계수 적용
    0:  { up:[250,180,145], dn:[195,145, 95] },
    // 북한산성코스: 실측 기반
    9:  { up:[210,155,105], dn:[150,105, 75] },
  };

  if(courseData[course.id]){
    var d=courseData[course.id];
    UP_MIN   = d.up;
    DN_MIN   = d.dn;
    HIKE_TIME= [d.up[0]+d.dn[0], d.up[1]+d.dn[1], d.up[2]+d.dn[2]];
    TOTAL    = HIKE_TIME[0]+0.5;
    return;
  }

  // 나머지 코스: 산대장=course.time, 비율로 계산
  var upD=course.time;
  var dnD=Math.round(upD*0.71);
  var upC=Math.round(upD*270/210);
  var dnC=Math.round(dnD*270/210);
  var upL=Math.round(upD*360/210);
  var dnL=Math.round(dnD*360/210);
  UP_MIN=[upL,upC,upD];
  DN_MIN=[dnL,dnC,dnD];
  HIKE_TIME=[upL+dnL,upC+dnC,upD+dnD];
  TOTAL=HIKE_TIME[0]+0.5;
}

        + '</div>';
  var endTooltip = gCourse.summit ? '🏔 백운대 정상 (해발 837m)' : '🏆 '+gCourse.eName;
  gEM=L.marker(gCourse.e,{icon:L.divIcon({html:endHtml,className:'',iconAnchor:[10,14],zIndexOffset:100})}).addTo(gMap).bindTooltip(endTooltip,{permanent:false,direction:'top'});
  gMarkers.forEach(function(m){m.setLatLng(gCourse.s);});
  try{
    gMap.fitBounds(L.latLngBounds(gRoute),{padding:[40,40],animate:false});
    // 줌/중심 저장
    setTimeout(function(){
      gSavedCenter=gMap.getCenter();
      gSavedZoom=gMap.getZoom();
    },300);
  }catch(e){
    gMap.fitBounds(L.latLngBounds([gCourse.s,gCourse.e]),{padding:[50,50],animate:false});
  }
  updateBars(0);drawElev(gCourse);
}

function goClick() {
  if(!gCourse){alert('코스를 먼저 선택하세요!');return;}
  if(gTimer)return;
  if(gStep>=TOTAL){gStep=0;gMarkers.forEach(function(m){m.setLatLng(gCourse.s);});gProg.setLatLngs([]);updateBars(0);}
  setBtn(true);
  gTimer=setInterval(function(){
    var spd=parseInt(document.getElementById('spd').value);
    //
    //
    gStep = Math.min(gStep + spd*0.06, TOTAL);
    var N=gRoute.length;
    var allDone=true;

    // ── 3명 각자 독립적으로 이동 ──
    for(var i=0;i<3;i++){
      var elapsed = gStep;          //
      var upMin   = UP_MIN[i];      //
      var dnMin   = DN_MIN[i];      //
      var totalMin= HIKE_TIME[i];   //
      var pos;

      if(elapsed < upMin){
        //
        var hp = elapsed / upMin;
        pos = Math.min(Math.floor(hp*(N-1)), N-1);
        allDone = false;
      } else if(elapsed < totalMin){
        //
        var dp = (elapsed - upMin) / dnMin;
        pos = Math.min(Math.floor((1-dp)*(N-1)), N-1);
        allDone = false;
      } else {
        //
        pos = 0;
      }
      gMarkers[i].setLatLng(gRoute[Math.max(0, Math.min(pos, N-1))]);
    }

    //
    //
    //
    //
    var elapsed2 = gStep;
    gProg.setStyle({color:'#1b7e3e', weight:6, opacity:1});
    if(elapsed2 < UP_MIN[2]){
      //
      var hp2 = elapsed2 / UP_MIN[2];
      var pi2 = Math.min(Math.floor(hp2*(N-1)), N-1);
      gProg.setLatLngs(gRoute.slice(0, pi2+1));
    } else {
      //
      gProg.setLatLngs(gRoute);
    }

    updateBars(gStep);
    if(allDone){ clearInterval(gTimer); gTimer=null; setBtn(false); showPopup(); }
  },50);
}

function resetClick(){
  clearInterval(gTimer);gTimer=null;gStep=0;setBtn(false);
  if(gCourse){gMarkers.forEach(function(m){m.setLatLng(gCourse.s);});if(gProg)gProg.setLatLngs([]);updateBars(0);}
}

function setBtn(b){
  var btn=document.getElementById('btnGo');
  btn.textContent=b?'⏸ 진행 중...':'▶ 출발';
  b?btn.classList.add('busy'):btn.classList.remove('busy');
  btn.onclick=b?null:goClick;
}

function toHMS(mins){
  var h=Math.floor(mins/60),m=Math.round(mins%60);
  if(h>0&&m>0) return h+'시간 '+m+'분';
  if(h>0) return h+'시간';
  return m+'분';
}

function updateBars(step){
  if(!gCourse)return;
  // 시간은 3명 모두 동일 (실제 시계)
  var elapsed = step;
  for(var i=0;i<3;i++){
    var upMin    = UP_MIN[i];
    var dnMin    = DN_MIN[i];
    var totalMin = HIKE_TIME[i];
    var label, barPct;

    if(elapsed >= totalMin){
      // 완주
      barPct = 100;
      label = '✅ 총 ' + toHMS(totalMin) + ' 완주!';
    } else if(elapsed < upMin){
      // 등산 중: 거리는 각자 속도, 시간은 공통
      var hp = Math.max(0, Math.min(1, elapsed / upMin));
      barPct = hp * 50;
      var distKm = hp * gCourse.dist;
      label = '⬆ ' + distKm.toFixed(1) + 'km · ' + toHMS(elapsed);
    } else {
      // 하산 중: 거리는 각자 속도, 시간은 공통
      var dp = Math.max(0, Math.min(1, (elapsed - upMin) / dnMin));
      barPct = 50 + dp * 50;
      var distLeft = Math.max(0, (1-dp) * gCourse.dist);
      label = '⬇ ' + distLeft.toFixed(1) + 'km · ' + toHMS(elapsed);
    }
    document.getElementById('b'+i).style.width = Math.max(0, Math.min(100, barPct)) + '%';
    document.getElementById('s'+i).textContent = label;
  }
}

function showPopup(){
  var c=gCourse;
  document.getElementById('pIco').textContent=c.summit?'🚩':'🏆';
  document.getElementById('pTtl').textContent=c.summit?'백운대 정상 정복!':c.eName+' 도착!';
  document.getElementById('pDsc').textContent=c.summit?'해발 837m 북한산 최고봉!\n소모 칼로리: 약 '+c.kcal+'kcal':c.name+' 완주!\n총 거리 '+c.dist+'km · 칼로리 약 '+c.kcal+'kcal\n수고하셨습니다! 🙌';
  document.getElementById('popup').classList.add('on');document.getElementById('mask').classList.add('on');
}
function closePopup(){document.getElementById('popup').classList.remove('on');document.getElementById('mask').classList.remove('on');}

function renderBtns(){
  function toHour(m){var h=Math.floor(m/60),r=m%60;return h>0&&r>0?h+'시간 '+r+'분':h>0?h+'시간':r+'분';}
  function mk(c){
    return '<button class="cbtn" id="cb'+c.id+'" onclick="pick('+c.id+')">'
      + '<div class="cn">'+c.name+'</div>'
      + '<div class="cd">'+c.dist+'km·'+toHour(c.time)+'</div></button>';
  }
  document.getElementById('gEasy').innerHTML=COURSES.filter(function(c){return c.diff==='easy';}).map(mk).join('');
  document.getElementById('gMed').innerHTML=COURSES.filter(function(c){return c.diff==='medium';}).map(mk).join('');
}

function drawElev(c){
  var cv=document.getElementById('eCanvas');
  var pw=Math.max(cv.parentElement.clientWidth-28,200),ph=148;
  var PR=window.devicePixelRatio||1;
  cv.width=pw*PR;cv.height=ph*PR;cv.style.width=pw+'px';cv.style.height=ph+'px';
  var ctx=cv.getContext('2d');ctx.scale(PR,PR);
  var data=WAYPTS[c.id];if(!data)return;
  var wps=data.wps,segs=data.segs,elevs=data.elevs;
  var PL=4,PR2=4,PT=44,PB=36,CW=pw-PL-PR2,CH=ph-PT-PB;
  var tk=wps[wps.length-1].km;
  function sx(km){return PL+(km/tk)*CW;}
  var mn=Math.min.apply(null,elevs)-30,mx=Math.max.apply(null,elevs)+40;
  function sy(e){return PT+CH-((e-mn)/(mx-mn))*CH;}
  var all=[];
  for(var s=0;s<wps.length-1;s++){
    var kA=wps[s].km,kB=wps[s+1].km,eA=elevs[s],eB=elevs[s+1];
    for(var i=0;i<30;i++){
      var t=i/30,km2=kA+(kB-kA)*t;
      var e2=eA+(eB-eA)*(t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2)+Math.sin(t*Math.PI*3)*8;
      all.push({km:km2,elev:e2,seg:s});
    }
  }
  all.push({km:tk,elev:elevs[elevs.length-1],seg:wps.length-2});
  ctx.clearRect(0,0,pw,ph);
  for(var s2=0;s2<segs.length;s2++){
    var sp=all.filter(function(p){return p.seg===s2;});
    if(sp.length<2)continue;
    var col=DC[segs[s2].diff]||'#4a90d9';
    var rv=parseInt(col.slice(1,3),16),gv=parseInt(col.slice(3,5),16),bv=parseInt(col.slice(5,7),16);
    ctx.beginPath();ctx.moveTo(sx(sp[0].km),PT+CH);ctx.lineTo(sx(sp[0].km),sy(sp[0].elev));
    for(var j=1;j<sp.length;j++)ctx.lineTo(sx(sp[j].km),sy(sp[j].elev));
    ctx.lineTo(sx(sp[sp.length-1].km),PT+CH);ctx.closePath();
    var g=ctx.createLinearGradient(0,PT,0,PT+CH);
    g.addColorStop(0,'rgba('+rv+','+gv+','+bv+',0.8)');g.addColorStop(1,'rgba('+rv+','+gv+','+bv+',0.2)');
    ctx.fillStyle=g;ctx.fill();
  }
  ctx.beginPath();ctx.moveTo(sx(all[0].km),sy(all[0].elev));
  for(var k=1;k<all.length;k++)ctx.lineTo(sx(all[k].km),sy(all[k].elev));
  ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1.5;ctx.setLineDash([]);ctx.stroke();
  wps.forEach(function(wp){
    if(wp.hidden)return;
    var x=sx(wp.km);
    ctx.beginPath();ctx.setLineDash([3,3]);ctx.moveTo(x,PT);ctx.lineTo(x,PT+CH);
    ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
  });
  var aY=PT+CH*0.38;
  var visIdx=wps.map(function(wp,i){return wp.hidden?null:i;}).filter(function(i){return i!==null;});
  var aSegs=[];
  for(var vi=0;vi<visIdx.length-1;vi++){
    var iA=visIdx[vi],iB=visIdx[vi+1],tA=0;
    for(var si=iA;si<iB;si++)tA+=(segs[si]?segs[si].time:0);
    aSegs.push({x1:sx(wps[iA].km)+4,x2:sx(wps[iB].km)-4,km:(wps[iB].km-wps[iA].km).toFixed(1),t:tA});
  }
  var aCols=aSegs.map(function(_,i){return i===aSegs.length-1?'#f5a020':'#4a90d9';});
  aSegs.forEach(function(a,si){
    var x1=a.x1,x2=a.x2,col2=aCols[si],mx2=(x1+x2)/2;
    if(x2-x1<10)return;
    ctx.beginPath();ctx.moveTo(x1,aY);ctx.lineTo(x2-9,aY);ctx.strokeStyle=col2;ctx.lineWidth=2.5;ctx.setLineDash([]);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x2,aY);ctx.lineTo(x2-10,aY-5);ctx.lineTo(x2-10,aY+5);ctx.closePath();ctx.fillStyle=col2;ctx.fill();
    if(x2-x1>=35){ctx.font='bold 10px sans-serif';ctx.fillStyle=col2;ctx.textAlign='center';ctx.fillText(a.km+'km',mx2,aY-7);}
    if(x2-x1>=45){
      var ts=a.t>=60?Math.floor(a.t/60)+'시간'+(a.t%60>0?a.t%60+'분':''):a.t+'분';
      ctx.font='9px sans-serif';ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillText('('+ts+')',mx2,aY+14);
    }
  });
  wps.forEach(function(wp,wi){
    if(wp.hidden)return;
    var x=sx(wp.km);
    var pi2=Math.min(Math.round((wp.km/tk)*(all.length-1)),all.length-1);
    var y=sy(all[pi2].elev);
    var isL=wi===wps.length-1||(wps.slice(wi+1).every(function(w){return w.hidden;}));
    ctx.beginPath();ctx.arc(x,y,isL?7:5,0,Math.PI*2);ctx.fillStyle=isL?'#f5a020':'#2ecc71';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.font=(isL?'bold ':'')+( wp.name.length>8?9:10)+'px sans-serif';
    ctx.fillStyle=isL?'#c47a00':'#333';
    ctx.textAlign=wi===0?'left':(isL?'right':'center');
    if(wi===0&&wp.name.length>8){
      var sp2=wp.name.indexOf(' ');
      var l1=sp2>0?wp.name.slice(0,sp2):wp.name.slice(0,Math.ceil(wp.name.length/2));
      var l2=sp2>0?wp.name.slice(sp2+1):wp.name.slice(Math.ceil(wp.name.length/2));
      ctx.fillText(l1,x,ph-18);ctx.fillText(l2,x,ph-6);
    }else{ctx.fillText(wp.name,x,ph-6);}
  });
  document.getElementById('elevSum').textContent=c.dist+'km ('+Math.floor(c.time/60)+'시간 '+(c.time%60>0?c.time%60+'분':'0분')+')';
}

window.addEventListener('DOMContentLoaded',function(){
  document.getElementById('img0').src=FACES[0];
  document.getElementById('img1').src=FACES[1];
  document.getElementById('img2').src=FACES[2];
  initMap();renderBtns();
  setTimeout(function(){pick(0);},800);
});
var resizeTimer=null;
function onDisplayChange(){
  if(resizeTimer)clearTimeout(resizeTimer);
  [100, 400, 800].forEach(function(delay){
    setTimeout(function(){
      if(!gMap) return;
      gMap.invalidateSize({animate:false});
      if(gCourse && gRoute && gRoute.length>1){
        if(gProg){var ll=gProg.getLatLngs();gMap.removeLayer(gProg);gProg=L.polyline(ll,{color:'#1b7e3e',weight:6,opacity:1}).addTo(gMap);}
      }
    }, delay);
  });
  resizeTimer=setTimeout(function(){
    if(gCourse)drawElev(gCourse);
  },400);
}
window.addEventListener('resize',onDisplayChange);
document.addEventListener('fullscreenchange',onDisplayChange);
document.addEventListener('webkitfullscreenchange',onDisplayChange);
</script>
